# ============================================================================
# TechDepot - Docker Compose
# ============================================================================
# Este archivo orquesta todos los servicios de la aplicación TechDepot:
#
#   1. db          → Base de datos SQL Server 2022 Express
#   2. db-init     → Inicializador de la base de datos (se ejecuta una sola vez)
#   3. backend     → API REST con Spring Boot (Java 21, Maven)
#   4. frontend    → Interfaz web con React + Vite (TypeScript)
#
# Uso:
#   docker compose up -d          → Levantar todos los servicios
#   docker compose down           → Detener todos los servicios
#   docker compose down -v        → Detener y eliminar volúmenes (reset DB)
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # Base de datos SQL Server 2022 Express
  # Almacena todos los datos de la aplicación.
  # El healthcheck verifica que SQL Server esté listo para aceptar conexiones
  # antes de que los demás servicios intenten conectarse.
  # --------------------------------------------------------------------------
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: techdepot-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TechDepot2026!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - techdepot-db-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TechDepot2026!' -C -Q 'SELECT 1'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Inicializador de la base de datos (ejecución única)
  # Espera a que SQL Server esté saludable y luego ejecuta el script de
  # creación de tablas SOLO si la base de datos "TechDepot" no existe aún.
  # Este contenedor se detiene automáticamente después de ejecutarse.
  # --------------------------------------------------------------------------
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    entrypoint: /bin/bash
    container_name: techdepot-db-init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./database:/database:ro
    command:
      - "-c"
      - |
        if /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'TechDepot2026!' -C -Q "SELECT name FROM sys.databases WHERE name = 'TechDepot'" -h -1 -W | grep -q 'TechDepot'; then
          echo 'Database already exists, skipping init';
        else
          /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P 'TechDepot2026!' -C -i /database/TechDepotTablesQuery.sql &&
          echo 'Database created successfully';
        fi
    restart: "no"

  # --------------------------------------------------------------------------
  # Backend - API REST con Spring Boot
  # Se construye desde el Dockerfile en ./td-backend.
  # Se conecta a SQL Server usando las credenciales configuradas.
  # Espera a que la base de datos esté saludable antes de iniciar.
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./td-backend
      dockerfile: Dockerfile
    container_name: techdepot-backend
    ports:
      - "8080:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://db:1433;databaseName=TechDepot;encrypt=true;trustServerCertificate=true;"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: "TechDepot2026!"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.SQLServerDialect"
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Frontend - Aplicación web con React + Vite (TypeScript)
  # Se construye desde el Dockerfile en ./td-frontend.
  # Sirve la aplicación en el puerto 5173 (mapeado al puerto 80 del contenedor).
  # Espera a que el backend esté disponible antes de iniciar.
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./td-frontend
      dockerfile: Dockerfile
    container_name: techdepot-frontend
    ports:
      - "5173:80"
      - "5174:443"
    depends_on:
      - backend
    restart: unless-stopped

# ============================================================================
# Volúmenes persistentes
# techdepot-db-data: Almacena los datos de SQL Server de forma persistente
#                    para que no se pierdan al reiniciar los contenedores.
# ============================================================================
volumes:
  techdepot-db-data:
